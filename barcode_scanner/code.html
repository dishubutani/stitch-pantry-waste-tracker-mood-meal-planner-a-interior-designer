<style>
        .scanner-viewport {
            position: relative;
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .scan-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 150px, rgba(0,0,0,0.6) 150px);
            z-index: 10;
        }
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 2px solid rgba(145, 247, 142, 0.5);
            border-radius: 2rem;
            z-index: 20;
        }
        .scan-line {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #91f78e;
            box-shadow: 0 0 15px #91f78e;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #91f78e;
        }
        .corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 2rem; }
        .corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 2rem; }
        .corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 2rem; }
        .corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 2rem; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
